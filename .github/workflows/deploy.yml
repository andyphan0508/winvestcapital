name: Deploy to GitHub Pages

# Tự động chạy mỗi khi push lên nhánh main, hoặc bấm chạy tay trong tab Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Quyền tối thiểu để publish lên GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Mỗi lúc chỉ chạy 1 lần deploy; lần mới hủy lần đang chạy dở.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Phải khớp tên repo: https://<user>.github.io/winvestcapital/
          BASE_PATH: /winvestcapital/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
